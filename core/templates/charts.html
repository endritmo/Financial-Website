{% extends 'base.html' %}
{% block content %}
<div class="page-header">
    <h2>Market Charts</h2>
    <form method="GET" action="{% url 'charts' %}" class="symbol-selector">
        <select name="symbol" onchange="this.form.submit()">
            <option value="BINANCE:BTCUSDT" {% if symbol == 'BINANCE:BTCUSDT' %}selected{% endif %}>Bitcoin (BTC/USDT)</option>
            <option value="OANDA:EURUSD" {% if symbol == 'OANDA:EURUSD' %}selected{% endif %}>Forex (EUR/USD)</option>
            <option value="NASDAQ:AAPL" {% if symbol == 'NASDAQ:AAPL' %}selected{% endif %}>Apple (AAPL)</option>
            <option value="TVC:GOLD" {% if symbol == 'TVC:GOLD' %}selected{% endif %}>Gold</option>
        </select>
    </form>
</div>
<div class="chart-container">
    <div class="tradingview-widget-container" style="height:100%;width:100%">
      <div id="tradingview_12345" style="height:calc(100vh - 200px);width:100%"></div>
      <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
      <script type="text/javascript">
      new TradingView.widget({
        "autosize": true,
        "symbol": "{{ symbol }}",
        "interval": "D",
        "timezone": "Etc/UTC",
        "theme": "dark",
        "style": "1",
        "locale": "en",
        "enable_publishing": false,
        "backgroundColor": "#111827",
        "gridColor": "#1f2937",
        "hide_top_toolbar": false,
        "save_image": false,
        "container_id": "tradingview_12345"
      });
      </script>
    </div>
</div>
{% endblock %}
