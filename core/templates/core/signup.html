{% extends 'core/base.html' %}

{% block title %}Sign up | FinPlatform{% endblock %}

{% block content %}
<div style="max-width: 400px; margin: 4rem auto;">
    <div class="forum-card">
        <h2 style="margin-bottom: 1.5rem; text-align: center;">Create an Account</h2>
        
        <form method="post" action=".">
            {% csrf_token %}
            {{ form.as_p }}
            
            <button type="submit" class="btn-primary" style="width: 100%;">Sign up</button>
        </form>
    </div>
    <div style="text-align: center; margin-top: 1rem; color: var(--text-muted);">
        Already have an account? <a href="{% url 'core:login' %}" style="color: var(--accent);">Log in</a>
    </div>
</div>
{% endblock %}
