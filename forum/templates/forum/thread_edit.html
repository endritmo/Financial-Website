{% extends 'core/base.html' %}

{% block title %}Edit Thread | FinPlatform{% endblock %}

{% block content %}
<a href="{% url 'forum:thread_detail' thread.pk %}" style="color: var(--accent); text-decoration: none" >&larr; Cancel</a>

<div class="forum-card" style="margin-top: 1rem; max-width: 800px">
  <h2 style="margin-bottom: 1.5rem">Edit Thread</h2>
  <form method="POST">
    {% csrf_token %} 
    {{ form.as_p }}
    <button type="submit" class="btn-primary">Save Changes</button>
  </form>
</div>
{% endblock %}
