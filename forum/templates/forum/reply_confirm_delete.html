{% extends 'core/base.html' %}

{% block title %}Delete Reply | FinPlatform{% endblock %}

{% block content %}
<div class="forum-card" style="margin-top: 2rem; max-width: 600px; margin-left: auto; margin-right: auto; text-align: center;">
  <h2 style="margin-bottom: 1rem; color: #ef4444;">Delete Reply?</h2>
  <p style="margin-bottom: 2rem; color: var(--text-muted);">Are you sure you want to delete this reply? This action cannot be undone.</p>
  
  <div style="padding: 1rem; background-color: var(--bg-main); border-radius: 8px; margin-bottom: 2rem; text-align: left; font-size: 0.9rem;">
      {{ reply.content|linebreaks }}
  </div>

  <form method="POST" style="display: flex; gap: 1rem; justify-content: center;">
    {% csrf_token %}
    <a href="{% url 'forum:thread_detail' reply.thread.pk %}" class="btn-secondary">Cancel</a>
    <button type="submit" class="btn-danger">Yes, delete it</button>
  </form>
</div>
{% endblock %}
